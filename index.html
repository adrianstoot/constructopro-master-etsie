            'baldosa': { nombre: 'Aplacado / Pavimento Gres Porcelánico', k: 1.00, mu: 10000, cp: 840, co2: 0.40, rw: 40, densidad: 2000, precioMaterial: 1800, precioManoObra: 1000, categoria: 'acabados_pesados', color: '#78350f', fuego: 'A1', marca: 'Porcelanosa Grupo A.I.E.', producto: 'STON-KER® Técnico', web: 'https://www.porcelanosa.com/es', convenio: 'Cátedra Porcelanosa UPV', desc: 'Cerámica técnica prensada y cocida a >1200ºC. Absorción de agua prácticamente nula (<0.1%). Gran resistencia al desgaste y heladas.' },
            'camara_aire': { nombre: 'Cámara de Aire Confinada (Estanca)', k: 0.18, mu: 1, cp: 1000, co2: 0, rw: 5, densidad: 1.2, precioMaterial: 0, precioManoObra: 0, categoria: 'camaras_aire', color: '#0f172a', fuego: 'A1', marca: 'Física Natural / Diseño Arquitectónico', producto: 'Espacio Vacío', web: '#', convenio: 'N/A', desc: 'Espacio cerrado no ventilado (habitualmente <2cm). El aire inmóvil actúa como aislante térmico aportando una resistencia normativa estándar (R~0.18 m2K/W).' },
            'camara_ventilada': { nombre: 'Cámara de Aire EXTERIOR VENTILADA', k: 0.18, mu: 1, cp: 1000, co2: 0, rw: 0, densidad: 1.2, precioMaterial: 0, precioManoObra: 0, categoria: 'camaras_aire', color: '#1e293b', fuego: 'A1', marca: 'Física Natural / Diseño Arquitectónico', producto: 'Flujo Continuo (Tiro Térmico)', web: '#', convenio: 'N/A', desc: 'Cámara conectada al aire exterior. Genera efecto chimenea evaporando humedades. Por DB-HE, la cámara y todas las capas situadas a su exterior NO computan para el cálculo de Transmitancia (U).' },
            'grava': { nombre: 'Capa de Grava de Protección', k: 2.00, mu: 1, cp: 800, co2: 0.01, rw: 15, densidad: 1500, precioMaterial: 20, precioManoObra: 15, categoria: 'auxiliares', color: '#cbd5e1', fuego: 'A1', marca: 'Proveedores de Áridos Locales', producto: 'Grava Lavada 16/32', web: '#', convenio: 'N/A', desc: 'Lastre contra el levantamiento por succión de viento en cubiertas invertidas. Protege las láminas de la degradación por rayos UV directos.' }
        };

        // ============================================================================
        // 2. ESTADO GLOBAL (STATE MANAGEMENT)
        // ============================================================================
        const state = {
            estadoProyecto: { zona: 'C', ambiente: 'fachada' },
            nombreCerramiento: 'Cerramiento Envolvente Tipo A',
            modoVisor: '2d',
            seccionActiva: 'editor',
            capasCerramiento: [],
            history: [[]],
            pointer: 0,
            elementosProyecto: [],
            medicionGlobal: 150,
            filasExpandidas: {},
            searchTerm: '',
            materialFocus: null,
            dialogo: null,
            stats: null
        };

        // ============================================================================
        // 3. MOTOR INTELIGENTE: ASISTENTE DIDÁCTICO, CÁLCULO FÍSICO Y AUTO-FIX
        // ============================================================================
        function motorDidacticoCTE(capas, estadoProyecto) {
            const validaciones = [];
            const instrucciones = [];
            
            if (capas.length === 0) {
                instrucciones.push({ tipo: 'guia', texto: "<strong>INICIO DEL DISEÑO CONSTRUCTIVO:</strong><br/>Tu lienzo de trabajo está vacío. Según los requerimientos del Documento Básico SE (Seguridad Estructural), todo cerramiento requiere una base portante. Empieza añadiendo una hoja principal desde las categorías <em>'Fábrica y Hormigones'</em> o <em>'Estructura Ligera'</em> en el panel izquierdo." });
                return { estado: 'vacio', valorU: 0, espesorTotal: 0, pesoPropio: 0, costeMateriales: 0, costeManoObra: 0, costeDirectoTotalM2: 0, co2Total: 0, RwEstimado: 0, validaciones, instrucciones, perfilTermico: [] };
            }

            const ambiente = estadoProyecto.ambiente;
            const zona = estadoProyecto.zona;
            const esCubierta = ambiente === 'cubierta';
            const esSuelo = ambiente === 'terreno';
            const esExterior = ambiente === 'fachada' || esCubierta;
            
            const Rsi = esCubierta ? 0.10 : esSuelo ? 0.17 : 0.13;
            const Rse = esCubierta ? 0.04 : esSuelo ? 0.04 : 0.04;
            
            let totalR = Rsi + Rse;
            let espesorTotal = 0; let pesoPropio = 0; let costeMateriales = 0; let costeManoObra = 0; let co2Total = 0; 
            let maxRw = 0; let sdTotal = 0;
            
            let flags = {
                estructura: false, aislante: false, impermeable: false, barreraVapor: false, 
                camaraVentilada: false, acabadoExteriorCorrecto: false, acabadoInteriorCorrecto: false
            };
            
            const datosGlaser = []; 

            capas.forEach((capa, idx) => {
                const mat = BASE_DATOS_MATERIALES[capa.idMaterial];
                const espesorM = capa.espesor / 1000;
                espesorTotal += capa.espesor;
                
                let capaR = 0;
                if (flags.camaraVentilada) {
                    capaR = 0; 
                } else {
                    capaR = mat.categoria.includes('camara') ? (mat.nombre.includes('Estanca') ? 0.18 : 0) : (espesorM / mat.k);
                }
                
                totalR += capaR;
                sdTotal += (mat.mu * espesorM);
                pesoPropio += (espesorM * mat.densidad);
                
                if (mat.rw > maxRw) maxRw = mat.rw;
                co2Total += (espesorM * mat.densidad * mat.co2);
                
                costeMateriales += (espesorM * mat.precioMaterial);
                costeManoObra += (espesorM * mat.precioManoObra);

                if (['fabrica_pesada', 'estructura_ligera', 'placas_paneles'].includes(mat.categoria) && capa.espesor >= 40) flags.estructura = true;
                if (mat.categoria.includes('aislamiento')) flags.aislante = true;
                if (mat.categoria === 'impermeabilizacion') flags.impermeable = true;
                if (mat.nombre.includes('Vapor')) flags.barreraVapor = true;
                if (mat.nombre.includes('VENTILADA')) flags.camaraVentilada = true;
                
                if (idx === 0) {
                    if (['acabados_pesados', 'morteros_revocos', 'acabados_metalicos', 'auxiliares'].includes(mat.categoria)) flags.acabadoExteriorCorrecto = true;
                    if (mat.nombre.includes('Cara Vista') || mat.nombre.includes('Hormigón Armado') || mat.nombre.includes('Bloque de Hormigón')) flags.acabadoExteriorCorrecto = true;
                }

                if (idx === capas.length - 1) {
                    if (['acabados_pesados', 'morteros_revocos', 'placas_paneles', 'acabados_metalicos'].includes(mat.categoria)) flags.acabadoInteriorCorrecto = true;
                    if (mat.nombre.includes('Cara Vista')) flags.acabadoInteriorCorrecto = true;
                }

                datosGlaser.push({ id: capa.id, nombre: mat.nombre, R: capaR, Sd: mat.mu * espesorM, espesorM, mat });
            });

            const U = totalR > 0 ? 1 / totalR : 0;
            const maxU = esCubierta ? ZONAS_CTE[zona].maxUCubierta : esSuelo ? ZONAS_CTE[zona].maxUSuelo : ZONAS_CTE[zona].maxUMuro;
            const costeDirectoTotalM2 = costeMateriales + costeManoObra;

            const T_int = 20; const HR_int = 0.50; 
            const T_ext = 0; const HR_ext = 0.80;
            const calcPsat = (T) => 610.5 * Math.exp((17.269 * T) / (237.3 + T)); 
            
            const P_in = HR_int * calcPsat(T_int);
            const P_out = HR_ext * calcPsat(T_ext);
            
            let tempActual = T_int - (Rsi / totalR) * (T_int - T_ext);
            let PvActual = P_in;
            let riesgoCondensacion = false;
            
            const perfilTermico = [{ x: 0, T: T_int, pos: 'Ambiente Interior' }, { x: 0, T: tempActual, pos: 'Superficie Int' }];
            let currentEspesorAcumulado = 0;

            const capasGlaserReversed = [...datosGlaser].reverse();
            
            capasGlaserReversed.forEach((stat) => {
                currentEspesorAcumulado += stat.espesorM * 1000;
                tempActual -= (stat.R / totalR) * (T_int - T_ext);
                PvActual -= (stat.Sd / sdTotal) * (P_in - P_out);
                perfilTermico.push({ x: currentEspesorAcumulado, T: tempActual, pos: stat.nombre });

                if (PvActual > calcPsat(tempActual)) riesgoCondensacion = true;
            });
            perfilTermico.push({ x: currentEspesorAcumulado, T: T_ext, pos: 'Intemperie Exterior' });

            if (esExterior && !flags.acabadoExteriorCorrecto && capas.length > 0) {
                const matExt = BASE_DATOS_MATERIALES[capas[0].idMaterial];
                validaciones.push({ id: 'Const-Ext', estado: 'error', titulo: 'Praxis Constructiva: Material Inadecuado a Intemperie', 
                    mensaje: `La Capa 1 exterior [${matExt.nombre}] NO es resistente a la lluvia directa o a la radiación UV. Sufrirá una degradación fulminante.`, 
                    didactica: `Nunca se expone un aislamiento, cámara, lámina o fábrica porosa al exterior sin protección. Debes proyectar un Mortero Monocapa (Revestimiento Continuo) o configurar una Fachada Ventilada.`,
                    solucion: { tipo: 'agregar', material: 'mortero_monocapa', espesor: 15, posicion: 'exterior', textoBoton: 'Solucionar: Revestir con Mortero Monocapa (15mm)' }
                });
            }

            if ((ambiente.includes('interior') || ambiente === 'fachada' || ambiente === 'cubierta') && !flags.acabadoInteriorCorrecto && capas.length > 0) {
                const matInt = BASE_DATOS_MATERIALES[capas[capas.length - 1].idMaterial];
                validaciones.push({ id: 'Const-Int', estado: 'error', titulo: 'Praxis Constructiva: Paramento Interior Inacabado', 
                    mensaje: `La Capa Interna [${matInt.nombre}] ha quedado totalmente al descubierto hacia el interior de la vivienda o recinto.`, 
                    didactica: `Dejar bloques crudos, o peor aún, aislamientos de fibra (Lanas Minerales) al aire interior constituye un error grave de ejecución (desprendimiento de microfibras nocivas, patologías de polvo y estética inaceptable). Remátalo con una capa de Yeso o una Placa de Yeso Laminado (PYL).`,
                    solucion: { tipo: 'agregar', material: 'yeso', espesor: 15, posicion: 'interior', textoBoton: 'Solucionar: Enlucir con Yeso (15mm)' }
                });
            }

            if (!flags.estructura) {
                validaciones.push({ id: 'SE', estado: 'error', titulo: 'DB-SE: Inestabilidad Estructural Detectada', 
                    mensaje: `El cerramiento carece de una hoja portante o de un núcleo principal con resistencia al viento y peso.`, 
                    didactica: `Leyes de la Estática: Toda configuración necesita una inercia mecánica base para no colapsar. Debes insertar obligatoriamente una fábrica (Ladrillo, Bloque), un panel CLT o un Entramado de madera/acero.`,
                    solucion: { tipo: 'agregar', material: 'ladrillo_perforado', espesor: 115, posicion: 'interior_antes_acabado', textoBoton: 'Solucionar: Añadir Fábrica de Ladrillo (115mm)' }
                });
            } else if (!flags.aislante && esExterior && flags.acabadoExteriorCorrecto && flags.acabadoInteriorCorrecto) {
                instrucciones.push({ tipo: 'guia', texto: "<strong>Paso 2:</strong> Estructura y acabados resueltos. Sin embargo, este es un muro exterior, si lo dejas así, la calefacción se escapará a borbotones. Accede a la categoría de <span class='text-cyan-300 font-bold'>Aislamientos Térmicos</span>."});
            }

            if (esExterior) {
                if (!flags.aislante) {
                    validaciones.push({ id: 'HE1-Aisl', estado: 'error', titulo: 'DB-HE1: Puente Térmico Total Inaceptable', 
                        mensaje: `No se ha instalado ningún Aislamiento Térmico Específico.`, 
                        didactica: `Termodinámica de la Edificación: Materiales como el hormigón o el ladrillo son conductores del calor. Es mandatorio por normativa nZEB incluir barreras térmicas (XPS, EPS, Lanas, Aerogel).`,
                        solucion: { tipo: 'agregar', material: 'eps_grafito', espesor: 80, posicion: 'exterior_estructura', textoBoton: 'Solucionar: Instalar Sistema SATE (EPS Grafito 80mm)' }
                    });
                } else if (U > maxU) {
                    validaciones.push({ id: 'HE1-U', estado: 'error', titulo: 'DB-HE1: Límite de Transmitancia Excedido', 
                        mensaje: `U = ${U.toFixed(2)} W/m²K supera el límite estricto para la Zona ${zona} (${maxU.toFixed(2)} W/m²K).`, 
                        didactica: `Fórmula General: Transmitancia (U) = 1 / Resistencia (R). Para disminuir la U debes aumentar la R. Esto se logra directamente añadiendo más milímetros de espesor al material aislante.`,
                        solucion: { tipo: 'modificar_espesor', targetCategoria: 'aislamiento', incremento: 40, textoBoton: 'Solucionar: Aumentar Aislante Principal (+40mm)' }
                    });
                } else {
                    validaciones.push({ id: 'HE1-U', estado: 'ok', titulo: 'DB-HE1: Verificación Energética (nZEB)', mensaje: `Cálculo de Transmitancia válido: U = ${U.toFixed(2)} ≤ ${maxU.toFixed(2)} W/m²K.` });
                }

                if (riesgoCondensacion) {
                    validaciones.push({ id: 'HE1-Cond', estado: 'error', titulo: 'DB-HE1: Condensación Intersticial Severa', 
                        mensaje: `La Curva de Presión de Vapor cruza a la de Saturación. Se formará agua líquida dentro del muro.`, 
                        didactica: `Higrometría: El vapor que se genera dentro de la vivienda atraviesa el muro y, al llegar a una capa muy fría (el aislante térmico), se condensa y empapa los materiales. Interpón una lámina estanca al vapor.`,
                        solucion: { tipo: 'agregar', material: 'barrera_vapor', espesor: 1, posicion: 'antes_aislante', textoBoton: 'Solucionar: Sellar con Barrera de Vapor' }
                    });
                }
            }

            if (ambiente === 'cubierta') {
                if (!flags.impermeable) {
                    validaciones.push({ id: 'HS1', estado: 'error', titulo: 'DB-HS1: Cubierta Totalmente Permeable', 
                        mensaje: `Carece absolutamente de una membrana impermeabilizante.`, 
                        didactica: `Física de fluidos: Una cubierta plana acumula agua y la gravedad la filtra hacia la vivienda, provocando goteras inmediatas. Exigencia absoluta de láminas de estanqueidad.`,
                        solucion: { tipo: 'agregar', material: 'lamina_pvc', espesor: 2, posicion: 'exterior_estructura', textoBoton: 'Solucionar: Termosoldar Lámina PVC (2mm)' }
                    });
                } else if (flags.aislante) {
                    const idxAislante = capas.findIndex(c => BASE_DATOS_MATERIALES[c.idMaterial].categoria.includes('aislamiento'));
                    const idxImper = capas.findIndex(c => BASE_DATOS_MATERIALES[c.idMaterial].categoria === 'impermeabilizacion');
                    
                    if (idxAislante > -1 && idxImper > -1 && idxAislante < idxImper) {
                        if (!BASE_DATOS_MATERIALES[capas[idxAislante].idMaterial].nombre.includes('XPS')) {
                            validaciones.push({ id: 'HS1-Inv', estado: 'error', titulo: 'DB-HS1: Error en Cubierta Invertida', 
                                mensaje: `El aislante colocado a la intemperie por encima de la lámina DEBE ser XPS de celda cerrada.`, 
                                didactica: `Has diseñado una cubierta invertida perfecta, excepto por el aislante. Materiales como EPS, lanas o PIR absorben el agua de lluvia, perdiendo su aislamiento λ. El XPS es el único imputrescible.`,
                                solucion: { tipo: 'reemplazar', targetCategoria: 'aislamiento', nuevoMaterial: 'xps', textoBoton: 'Solucionar: Sustituir aislante exterior por XPS' }
                            });
                        }
                    }
                }
            }

            let RwEstimado = maxRw > 0 ? maxRw + Math.log10(Math.max(pesoPropio, 1))*2 : 20 * Math.log10(Math.max(pesoPropio, 10)) + 15;
            if(flags.camaraVentilada || capas.some(c => BASE_DATOS_MATERIALES[c.idMaterial].nombre.includes('Lana') || BASE_DATOS_MATERIALES[c.idMaterial].categoria === 'membranas_acusticas')) RwEstimado += 12; 
            
            if (esExterior && RwEstimado < 50 && flags.estructura) {
                validaciones.push({ id: 'HR', estado: 'aviso', titulo: 'DB-HR: Rendimiento Acústico al Límite', 
                    mensaje: `El Índice de reducción sonora Rw (~${RwEstimado.toFixed(0)} dB) es insuficiente frente a zonas de alto tráfico.`, 
                    didactica: `Principios Acústicos: No confíes solo en la Ley de Masas de muros pesados. Para conseguir un confort acústico top, diseña un sistema disociado de 'Masa-Muelle-Masa' mediante lanas y placas laminadas.`,
                    solucion: { tipo: 'agregar', material: 'lana_mineral', espesor: 46, posicion: 'interior_antes_acabado', textoBoton: 'Mejorar Acústica: Trasdosar (Lana Mineral + Pladur)', multi: true }
                });
            } else if (flags.estructura) {
                validaciones.push({ id: 'HR', estado: 'ok', titulo: 'DB-HR: Atenuación Sonora Conformada', mensaje: `Aislamiento a ruido aéreo estimado excelente: ~${RwEstimado.toFixed(0)} dB.` });
            }

            const numErrores = validaciones.filter(v => v.estado === 'error').length;
            const numAvisos = validaciones.filter(v => v.estado === 'aviso').length;

            if (numErrores === 0 && numAvisos === 0 && capas.length >= 3 && flags.acabadoExteriorCorrecto && flags.acabadoInteriorCorrecto) {
                instrucciones.push({ tipo: 'exito', texto: "🎓 <strong>¡EXCELENCIA TÉCNICA CONSEGUIDA!</strong> El detalle constructivo diseñado es perfecto. Resuelve la termodinámica, carece de condensaciones, está estructurado, acabado lógicamente y cumple todas las exigencias acústicas y de salubridad del CTE. Ya puedes enviar la partida al Presupuesto de Proyecto."});
            } else if (numErrores > 0) {
                instrucciones.push({ tipo: 'alerta', texto: `<strong>Tutoría Universitaria Activa:</strong> El sistema ha detectado <strong>${numErrores} infracción(es) normativa(s) o de ejecución constructiva grave.</strong><br/>No puedes validar un proyecto así en la vida real. Lee el fundamento físico en el panel inferior y presiona los botones de <strong>Solucionar</strong> para que el asistente reconfigure las capas automáticamente.`});
            }

            return { 
                estado: numErrores > 0 ? 'rojo' : numAvisos > 0 ? 'amarillo' : 'verde', 
                valorU: U, espesorTotal, pesoPropio, costeMateriales, costeManoObra, costeDirectoTotalM2, co2Total, RwEstimado,
                validaciones, instrucciones, perfilTermico 
            };
        }

        // ============================================================================
        // 4. MÉTODOS DE ACCIÓN (EVENT HANDLERS GLOBALES)
        // ============================================================================
        function pushHistory() {
            const snapshot = JSON.parse(JSON.stringify(state.capasCerramiento));
            if (state.pointer < state.history.length - 1) {
                state.history = state.history.slice(0, state.pointer + 1);
            }
            state.history.push(snapshot);
            state.pointer = state.history.length - 1;
        }

        window.deshacer = () => {
            if (state.pointer > 0) {
                state.pointer--;
                state.capasCerramiento = JSON.parse(JSON.stringify(state.history[state.pointer]));
                updateUI();
            }
        };

        window.rehacer = () => {
            if (state.pointer < state.history.length - 1) {
                state.pointer++;
                state.capasCerramiento = JSON.parse(JSON.stringify(state.history[state.pointer]));
                updateUI();
            }
        };

        window.setEstadoProyecto = (k, v) => { state.estadoProyecto[k] = v; updateUI(); };
        window.setNombreCerramiento = (v) => { state.nombreCerramiento = v; updateUI(); };
        window.setModoVisor = (v) => { state.modoVisor = v; updateUI(); };
        window.setSeccionActiva = (v) => { state.seccionActiva = v; updateUI(); };
        window.setSearchTerm = (v) => { state.searchTerm = v.toLowerCase(); updateUI(); };
        window.setMaterialFocus = (id) => { state.materialFocus = id; updateUI(); };
        window.setDialogo = (d) => { state.dialogo = d; updateUI(); };
        window.setMedicionGlobal = (v) => { state.medicionGlobal = Number(v); updateUI(); };
        window.toggleDesglose = (id) => { state.filasExpandidas[id] = !state.filasExpandidas[id]; updateUI(); };

        window.agregarCapaMaterial = (idMaterial) => {
            pushHistory();
            state.capasCerramiento.push({ id: `L_${Date.now()}_${Math.random()}`, idMaterial, espesor: 20 });
            updateUI();
            setTimeout(() => { const el = document.getElementById('finListaRef'); if(el) el.scrollIntoView({ behavior: 'smooth' }); }, 100);
        };

        window.modificarCapa = (id, campo, valor) => {
            // Not pushing history on every keystroke to avoid spam
            const capa = state.capasCerramiento.find(c => c.id === id);
            if(capa) capa[campo] = campo === 'espesor' ? Number(valor) : valor;
            updateUI();
        };

        window.eliminarCapa = (id) => {
            pushHistory();
            state.capasCerramiento = state.capasCerramiento.filter(c => c.id !== id);
            updateUI();
        };

        window.moverCapa = (index, dir) => {
            if ((dir === -1 && index === 0) || (dir === 1 && index === state.capasCerramiento.length - 1)) return;
            pushHistory();
            const arr = [...state.capasCerramiento];
            [arr[index], arr[index + dir]] = [arr[index + dir], arr[index]];
            state.capasCerramiento = arr;
            updateUI();
        };

        window.limpiarLienzo = () => {
            state.dialogo = {
                type: 'warning', title: 'Peligro: Reset de Topología', message: 'Se procederá a la demolición virtual de todas las capas del detalle constructivo actual. Esta acción destrozará el lienzo de forma irreversible. ¿Deseas proceder?',
                onConfirm: 'window.confirmarLimpiarLienzo()',
                onCancel: 'window.setDialogo(null)',
                confirmText: 'Sí, Demoler Capas'
            };
            updateUI();
        };

        window.confirmarLimpiarLienzo = () => {
            pushHistory();
            state.capasCerramiento = [];
            state.dialogo = null;
            updateUI();
        };

        window.aplicarSolucionCTE = (solucionObjStr) => {
            const solucion = JSON.parse(decodeURIComponent(solucionObjStr));
            pushHistory();
            const nuevas = [...state.capasCerramiento];
            if (solucion.tipo === 'agregar') {
                const nuevaCapa = { id: `L_${Date.now()}_${Math.random()}`, idMaterial: solucion.material, espesor: solucion.espesor };
                if (solucion.posicion === 'exterior') nuevas.unshift(nuevaCapa);
                else if (solucion.posicion === 'interior') nuevas.push(nuevaCapa);
                else if (solucion.posicion === 'exterior_estructura') {
                    const idx = nuevas.findIndex(c => ['fabrica_pesada', 'estructura_ligera'].includes(BASE_DATOS_MATERIALES[c.idMaterial].categoria));
                    if (idx !== -1) nuevas.splice(idx, 0, nuevaCapa); else nuevas.unshift(nuevaCapa);
                }
                else if (solucion.posicion === 'antes_aislante') {
                    const idx = nuevas.findIndex(c => BASE_DATOS_MATERIALES[c.idMaterial].categoria.includes('aislamiento'));
                    if (idx !== -1) nuevas.splice(idx + 1, 0, nuevaCapa); else nuevas.push(nuevaCapa);
                }
                else if (solucion.posicion === 'interior_antes_acabado') {
                    if (nuevas.length > 0) nuevas.splice(nuevas.length - 1, 0, nuevaCapa); else nuevas.push(nuevaCapa);
                }
                if (solucion.multi) nuevas.push({ id: `L_${Date.now()}_multi`, idMaterial: 'pladur', espesor: 15 });
            } 
            else if (solucion.tipo === 'modificar_espesor') {
                const idx = nuevas.findIndex(c => BASE_DATOS_MATERIALES[c.idMaterial].categoria.includes(solucion.targetCategoria));
                if(idx !== -1) nuevas[idx].espesor += solucion.incremento;
            } 
            else if (solucion.tipo === 'reemplazar') {
                const idx = nuevas.findIndex(c => BASE_DATOS_MATERIALES[c.idMaterial].categoria.includes(solucion.targetCategoria));
                if(idx !== -1) nuevas[idx].idMaterial = solucion.nuevoMaterial;
            }
            state.capasCerramiento = nuevas;
            updateUI();
        };

        window.anadirAPresupuesto = () => {
            if (state.capasCerramiento.length === 0) {
                state.dialogo = { type: 'error', title: 'Error de Presupuesto', message: 'No es posible enviar al Cuadro de Precios una partida constructiva vacía. Modela primero el cerramiento.', onConfirm: 'window.setDialogo(null)', confirmText: 'Entendido' };
                updateUI();
                return;
            }
            if (state.stats.estado === 'rojo') {
                state.dialogo = {
                    type: 'warning', title: 'Errores Normativos Críticos CTE', 
                    message: 'El detalle arquitectónico actual incumple severamente la normativa técnica constructiva (ver justificación inferior). Como técnico competente de la ETSIE, ¿deseas asumir la responsabilidad y volcar esta partida defectuosa al presupuesto de licitación oficial?',
                    onConfirm: 'window.ejecutarGuardadoPresupuesto()',
                    onCancel: 'window.setDialogo(null)', confirmText: 'Bajo mi responsabilidad'
                };
                updateUI();
                return;
            }
            window.ejecutarGuardadoPresupuesto();
        };

        window.ejecutarGuardadoPresupuesto = () => {
            state.dialogo = null;
            const descomposicion = state.capasCerramiento.map((c, i) => {
                const mat = BASE_DATOS_MATERIALES[c.idMaterial];
                const espM = c.espesor / 1000;
                return { 
                    id: c.id, 
                    codeM: `MT16${mat.categoria.substring(0,3).toUpperCase()}${i.toString().padStart(3,'0')}`, 
                    codeO: `MO16${mat.categoria.substring(0,3).toUpperCase()}${i.toString().padStart(3,'0')}`,
                    nombre: mat.nombre, producto: mat.producto, marca: mat.marca, espesor: c.espesor, 
                    precioBaseMat: mat.precioMaterial, precioBaseMo: mat.precioManoObra, 
                    rendimiento: espM, 
                    importe: (mat.precioMaterial + mat.precioManoObra) * espM 
                };
            });

            state.elementosProyecto.push({
                id: Date.now(), nombre: state.nombreCerramiento, medicion: state.medicionGlobal,
                precioUnitario: state.stats.costeDirectoTotalM2, total: state.stats.costeDirectoTotalM2 * state.medicionGlobal,
                ambiente: CONDICIONES_AMBIENTALES.find(a=>a.id===state.estadoProyecto.ambiente).nombre, descomposicion
            });
            
            state.dialogo = {
                type: 'info', title: 'Partida Acoplada Exitosamente', 
                message: 'La justificación económica del cerramiento ha sido compilada en el Presupuesto Base de Licitación (PBL). ¿Deseas limpiar el área de diseño para componer un detalle nuevo?',
                onConfirm: 'window.limpiarTrasPresupuesto()',
                onCancel: 'window.irAPresupuesto()', confirmText: 'Sí, Limpiar Área'
            };
            updateUI();
        };

        window.limpiarTrasPresupuesto = () => {
            state.capasCerramiento = [];
            state.nombreCerramiento = "Nuevo Detalle Constructivo";
            state.dialogo = null;
            state.seccionActiva = 'presupuesto';
            updateUI();
        };

        window.irAPresupuesto = () => {
            state.dialogo = null;
            state.seccionActiva = 'presupuesto';
            updateUI();
        };

            state.elementosProyecto = state.elementosProyecto.filter(p => p.id !== id);

        };

        function renderGlaserChart(perfilTermico, espesorTotal) {
            if (!perfilTermico || perfilTermico.length < 3) return '';
            const width = 400; const height = 200;
            const padding = { top: 25, bottom: 35, left: 45, right: 25 };
            const innerW = width - padding.left - padding.right;
            const innerH = height - padding.top - padding.bottom;
            const minT = Math.min(...perfilTermico.map(p => p.T), 0);
            const maxT = Math.max(...perfilTermico.map(p => p.T), 20);
            const getX = (x_mm) => padding.left + (x_mm / espesorTotal) * innerW;
            const getY = (T) => padding.top + innerH - ((T - minT) / (maxT - minT)) * innerH;

            const dPath = perfilTermico.map((p, i) => `${i===0?'M':'L'} ${getX(p.x)} ${getY(p.T)}`).join(' ');

            const pointsHTML = perfilTermico.map((p, i) => {
                let html = `<circle cx="${getX(p.x)}" cy="${getY(p.T)}" r="4" fill="#38bdf8" stroke="#020617" stroke-width="2"/>`;
                if (i > 0 && i < perfilTermico.length - 1) {
                    html += `<text x="${getX(p.x)}" y="${getY(p.T) - 10}" fill="#cbd5e1" font-size="9" font-weight="bold" text-anchor="middle" class="drop-shadow-lg">${p.T.toFixed(1)}°</text>`;
                }
                return html;
            }).join('');

            return `
                <div class="bg-[#0f172a] border border-slate-700/50 rounded-xl p-5 shadow-inner mt-4 shrink-0 print:hidden w-full">
                   <h4 class="text-[10px] uppercase font-black text-slate-400 mb-3 flex items-center tracking-widest"><i data-lucide="thermometer-snowflake" class="w-3.5 h-3.5 mr-2 text-cyan-400"></i> Gráfica Dinámica: Caída de Temperaturas</h4>
                   <div class="w-full overflow-hidden">
                     <svg viewBox="0 0 ${width} ${height}" class="w-full h-auto min-h-[120px] max-h-[160px] overflow-visible">
                        <line x1="${padding.left}" y1="${getY(0)}" x2="${width-padding.right}" y2="${getY(0)}" stroke="#475569" stroke-width="1" stroke-dasharray="4,4"/>
                        <text x="${padding.left - 8}" y="${getY(0)}" fill="#94a3b8" font-size="10" font-weight="bold" text-anchor="end" dominant-baseline="middle">0°C</text>
                        
                        <line x1="${padding.left}" y1="${getY(20)}" x2="${width-padding.right}" y2="${getY(20)}" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
                        <text x="${padding.left - 8}" y="${getY(20)}" fill="#ef4444" font-size="10" font-weight="bold" text-anchor="end" dominant-baseline="middle">20°C</text>

                        <path d="${dPath}" fill="none" stroke="#0ea5e9" stroke-width="3" style="filter: drop-shadow(0px 4px 6px rgba(14, 165, 233, 0.4))" />
                        
                        ${pointsHTML}
                        
                        <text x="${padding.left}" y="${height - 10}" fill="#64748b" font-size="8" font-weight="900" letter-spacing="0.1em" text-anchor="start">INTERIOR VIVIENDA</text>
                        <text x="${width - padding.right}" y="${height - 10}" fill="#64748b" font-size="8" font-weight="900" letter-spacing="0.1em" text-anchor="end">EXTERIOR CALLE</text>
                     </svg>
                   </div>
                </div>
            `;
        }

        function renderVista3DAxo(capas, espesorTotal) {

                innerHTML = `<div class="text-slate-600 animate-pulse flex flex-col items-center"><i data-lucide="box" class="w-10 h-10 mb-2 opacity-50"></i> <span class="text-xs font-medium">Espacio de simulación 3D vacío</span></div>`;
            } else {
                const capas3D = capas.map((capa, idx) => {
                    const mat = BASE_DATOS_MATERIALES[capa.idMaterial];
                    const capasAbajo = capas.slice(idx + 1);
                    const zTranslate = capasAbajo.reduce((sum, c) => sum + c.espesor, 0) * 0.4;
                    const h = capa.espesor * 0.4;

            const totalCosteDirecto = costeDirectoGuardado + costeDirectoActual;
            const CostesIndirectos = totalCosteDirecto * 0.06;
            const PEM = totalCosteDirecto + CostesIndirectos;
            const GastosGenerales = PEM * 0.13;
            const BeneficioIndustrial = PEM * 0.06;
            const PEC = PEM + GastosGenerales + BeneficioIndustrial;
            const IVA = PEC * 0.21;
            const PBL = PEC + IVA;

            const tableRows = state.elementosProyecto.map(el => `
                <tr class="border-b border-slate-300 break-inside-avoid">
                  <td class="p-3 border-x border-black font-bold text-base">${el.nombre}</td>
                  <td class="p-3 border-x border-black text-center text-[10px] uppercase font-bold text-slate-700">${el.ambiente}</td>
                  <td class="p-3 border-x border-black text-right font-mono">${el.medicion} m²</td>
                  <td class="p-3 border-x border-black text-right font-mono">${(el.precioUnitario * 1.02).toLocaleString('es-ES', { style: 'currency', currency: 'EUR' })}</td>
                  <td class="p-3 border-x border-black text-right font-bold font-mono">${(el.total * 1.02).toLocaleString('es-ES', { style: 'currency', currency: 'EUR' })}</td>
                </tr>
            `).join('');

            const currentPrintRow = state.capasCerramiento.length > 0 ? `
                <tr class="border-b border-black bg-slate-100 italic break-inside-avoid">
                  <td class="p-3 border-x border-black font-bold text-slate-800 text-base">${state.nombreCerramiento} (Edición)</td>
                  <td class="p-3 border-x border-black text-center text-[10px] uppercase font-bold text-slate-700">${CONDICIONES_AMBIENTALES.find(a=>a.id===state.estadoProyecto.ambiente)?.nombre.split('(')[0] || state.estadoProyecto.ambiente}</td>
                  <td class="p-3 border-x border-black text-right font-mono">${state.medicionGlobal} m²</td>
                  <td class="p-3 border-x border-black text-right font-mono">${(state.stats.costeDirectoTotalM2 * 1.02).toLocaleString('es-ES', { style: 'currency', currency: 'EUR' })}</td>
                  <td class="p-3 border-x border-black text-right font-bold font-mono">${(costeDirectoActual * 1.02).toLocaleString('es-ES', { style: 'currency', currency: 'EUR' })}</td>
                </tr>
            ` : '';

            let detailsSection = '<p class="text-xl italic text-slate-400 font-bold">Lienzo estructural vacío.</p>';
            if (state.capasCerramiento.length > 0) {
                const strataRows = state.capasCerramiento.map((capa, i) => {
                    const mat = BASE_DATOS_MATERIALES[capa.idMaterial];
                    return `
                    <tr class="break-inside-avoid">
                      <td class="p-3 border border-slate-400 text-center font-black text-slate-800 text-base">${i+1}</td>
                      <td class="p-3 border border-slate-400 font-bold">${mat.producto} <span class="text-xs text-slate-600 font-normal block mt-1">Matriz: ${mat.nombre} | λ: ${mat.k.toFixed(3)} | μ: ${mat.mu} | Fuego: ${mat.fuego}</span></td>
                      <td class="p-3 border border-slate-400 text-center font-mono font-black text-lg">${capa.espesor}</td>
                      <td class="p-3 border border-slate-400 font-bold text-xs uppercase">${mat.marca}</td>
                    </tr>
                    `;
                }).join('');

                detailsSection = `
                    <div class="border-4 border-slate-800 p-8 rounded-2xl bg-white shadow-none break-inside-avoid">
                      <h4 class="font-black text-3xl mb-4 text-black uppercase break-words">${state.nombreCerramiento}</h4>
                      <div class="grid grid-cols-4 gap-4 mb-8 bg-slate-100 p-5 border-2 border-slate-400 rounded-xl text-center">
                        <div class="border-r-2 border-slate-300 last:border-0"><span class="block text-xs uppercase font-bold text-slate-500 mb-1">Zona Climática</span><span class="text-lg font-black">${ZONAS_CTE[state.estadoProyecto.zona].nombre.split(' ')[1]}</span></div>
                        <div class="border-r-2 border-slate-300 last:border-0"><span class="block text-xs uppercase font-bold text-slate-500 mb-1">Espesor Geométrico</span><span class="text-lg font-black font-mono">${state.stats.espesorTotal} mm</span></div>
                        <div class="border-r-2 border-slate-300 last:border-0"><span class="block text-xs uppercase font-bold text-slate-500 mb-1">Transmitancia U</span><span class="text-lg font-black font-mono">${state.stats.valorU.toFixed(2)} W/m²K</span></div>
                        <div class="border-r-2 border-slate-300 last:border-0"><span class="block text-xs uppercase font-bold text-slate-500 mb-1">Acústica Global Rw</span><span class="text-lg font-black font-mono">~${state.stats.RwEstimado.toFixed(0)} dB</span></div>
                      </div>
                      
                      <h5 class="font-bold text-sm uppercase border-b-2 border-black mb-3 pb-1">Cuadro de Estratigrafía Topológica</h5>
                      <table class="w-full text-sm border-collapse mb-10 border-2 border-black">
                        <thead>
                          <tr class="bg-slate-800 text-white uppercase text-[10px]">
                            <th class="p-3 border border-black">Orden</th>
                            <th class="p-3 border border-black text-left">Especificación Técnica Material</th>
                            <th class="p-3 border border-black text-center">e (mm)</th>
                            <th class="p-3 border border-black text-left">Proveedor Homologado (ETSIE)</th>
                          </tr>
                        </thead>
                        <tbody>${strataRows}</tbody>
                      </table>
                      
                      <h5 class="font-bold text-sm uppercase border-b-2 border-black mb-6 pb-1">Plano de Sección 2D Acotada</h5>
                      <div class="h-auto min-h-[400px] border-2 border-slate-400 rounded-xl flex items-center justify-center relative bg-slate-50 overflow-hidden break-inside-avoid">
                         ${renderVista2DCAD(state.capasCerramiento, state.stats.espesorTotal, state.estadoProyecto.ambiente)}
                      </div>

                      <div class="mt-10 text-xs text-justify text-slate-700 p-6 bg-slate-100 border border-slate-400 rounded-xl font-medium leading-relaxed break-inside-avoid">
                        <strong class="text-black uppercase">Visado Colegial / Anexo Normativo:</strong> El presente documento técnico certifica que la solución constructiva descrita en la sección superior ha sido modelada, calculada y validada paramétricamente de acuerdo a las exigencias básicas del Código Técnico de la Edificación de España. Se asegura la ausencia de condensaciones intersticiales (Método de Glaser), el cumplimiento del límite de demanda energética en la zona climática ${state.estadoProyecto.zona} (DB-HE), la estanqueidad al agua y protección frente a la humedad (DB-HS), y se estima la atenuación acústica a ruido aéreo (DB-HR). El presupuesto es estimativo y se formula según la Ley de Contratos del Sector Público a través de bases del Instituto Valenciano de la Edificación.
                      </div>
                    </div>
                `;
            }

            return `
                <div class="hidden print:block w-full min-h-screen bg-white text-black p-10 font-sans m-0 relative">
                  <div class="border-b-[6px] border-black pb-6 mb-10 flex justify-between items-start">
                    <div class="flex-1">
                      <h1 class="text-4xl font-black text-black uppercase tracking-tighter mb-2 leading-none">Documento Básico de Proyecto</h1>
                      <h2 class="text-xl font-bold text-slate-800 tracking-wide uppercase">Memoria Constructiva, CTE y Presupuesto LCSP</h2>
                      <div class="mt-4 flex gap-4 font-mono text-xs font-bold">
                         <span class="bg-slate-200 px-3 py-1 border border-black">MÁSTER U. ETSIE UPV</span>
                         <span class="bg-slate-200 px-3 py-1 border border-black">BASE PRECIOS: IVE 2026</span>
                      </div>
                    </div>
                    <div class="text-right flex flex-col items-end">
                      <div class="text-3xl font-black text-white bg-black px-5 py-2 mb-3 inline-block border-2 border-black">CONSTRUCTO<span class="font-light">PRO</span></div>
                      <p class="text-sm font-bold text-slate-600 uppercase tracking-widest font-mono">Generado el: ${new Date().toLocaleDateString('es-ES')}</p>
                    </div>
                  </div>
                  
                  <h3 class="font-black text-2xl uppercase mb-6 bg-slate-200 p-3 border-l-8 border-black">I. Cuadro Resumen Presupuestario</h3>
                  <table class="w-full text-sm border-collapse mb-8 border border-black">
                    <thead>
                      <tr class="bg-slate-800 text-white uppercase text-xs">
                        <th class="p-3 text-left border border-black">Definición de Partida Estratigráfica</th>
                        <th class="p-3 text-center border border-black">Ambiente</th>
                        <th class="p-3 text-right border border-black">Superficie</th>
                        <th class="p-3 text-right border border-black">Coste Dir. Unit.</th>
                        <th class="p-3 text-right border border-black">Importe Directo</th>
                      </tr>
                    </thead>
                    <tbody>
                      ${tableRows}
                      ${currentPrintRow}
                    </tbody>
                  </table>

                  <div class="flex justify-end w-full mb-12 break-inside-avoid">
                    <table class="w-[450px] text-sm border-collapse border-2 border-black">
                       <tbody>
                          <tr><td class="p-2 border-b border-slate-300 font-bold pl-4">Total Costes Directos (+2% Medios Aux)</td><td class="p-2 border-b border-slate-300 text-right font-mono font-bold pr-4">${(totalCosteDirecto * 1.02).toLocaleString('es-ES', { style: 'currency', currency: 'EUR' })}</td></tr>
                          <tr><td class="p-2 border-b border-slate-300 pl-4">Costes Indirectos (6%)</td><td class="p-2 border-b border-slate-300 text-right font-mono pr-4">${CostesIndirectos.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' })}</td></tr>
                          <tr class="bg-slate-200"><td class="p-3 border-b-2 border-black font-black uppercase pl-4">Presupuesto Ejecución Material</td><td class="p-3 border-b-2 border-black text-right font-black font-mono pr-4 text-lg">${PEM.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' })}</td></tr>
                          <tr><td class="p-2 border-b border-slate-300 pl-4">Gastos Generales (13%)</td><td class="p-2 border-b border-slate-300 text-right font-mono pr-4">${GastosGenerales.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' })}</td></tr>
                          <tr><td class="p-2 border-b border-slate-300 pl-4">Beneficio Industrial (6%)</td><td class="p-2 border-b border-slate-300 text-right font-mono pr-4">${BeneficioIndustrial.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' })}</td></tr>
                          <tr class="bg-slate-200"><td class="p-3 border-b-2 border-black font-black uppercase pl-4">P. Ejecución por Contrata</td><td class="p-3 border-b-2 border-black text-right font-black font-mono pr-4 text-lg">${PEC.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' })}</td></tr>
                          <tr><td class="p-2 border-b border-slate-300 pl-4">I.V.A. Normativo (21%)</td><td class="p-2 border-b border-slate-300 text-right font-mono pr-4">${IVA.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' })}</td></tr>
                          <tr class="bg-black text-white"><td class="p-4 font-black uppercase text-xl pl-4 tracking-widest">Total P.B.L.</td><td class="p-4 text-right font-black font-mono text-2xl pr-4">${PBL.toLocaleString('es-ES', { style: 'currency', currency: 'EUR' })}</td></tr>
                       </tbody>
                    </table>
                  </div>

                  <div style="page-break-before: always;"></div>

                  <h3 class="font-black text-2xl uppercase mb-6 bg-slate-200 p-3 border-l-8 border-black mt-4">II. Certificación de Cerramiento Analizado</h3>
                  ${detailsSection}
                </div>
            `;
        }

        function renderApp() {
            state.stats = motorDidacticoCTE(state.capasCerramiento, state.estadoProyecto);
            
            return `
                <div class="flex flex-col h-screen w-full bg-[#020617] text-slate-200 font-sans overflow-hidden print:h-auto print:overflow-visible print:bg-white print:text-black">
                    ${renderDialogo()}
                    ${renderModalFichaTecnica()}

                    <!-- HEADER -->
                    <div class="h-16 bg-[#0f172a] border-b border-slate-800 flex items-center px-4 md:px-8 shadow-2xl shrink-0 z-20 justify-between print:hidden">
                        <div class="flex items-center min-w-0">
                            <div class="w-10 h-10 bg-gradient-to-br from-cyan-600 to-indigo-900 rounded-xl flex items-center justify-center font-black text-xl text-white shadow-inner border border-cyan-400/50 mr-4 shrink-0">UPV</div>
                            <div class="flex flex-col truncate">
                                <h1 class="font-black text-lg md:text-xl leading-tight text-slate-50 tracking-tight truncate">ConstructoPro <span class="text-cyan-400 font-normal">Máster</span></h1>
                                <h2 class="text-[9px] tracking-[0.2em] md:tracking-[0.3em] text-slate-500 uppercase flex items-center font-bold mt-0.5 truncate"><i data-lucide="graduation-cap" class="w-3 h-3 mr-1 shrink-0 text-slate-400"></i> ETSIE Simulador Paramétrico</h2>
                            </div>
                        </div>
                        
                        <div class="flex bg-[#020617] p-1.5 rounded-xl border border-slate-800 shadow-inner shrink-0 ml-4 overflow-x-auto custom-scrollbar">
                            <button onclick="window.setSeccionActiva('editor')" class="flex items-center px-4 md:px-6 py-2.5 rounded-lg text-[10px] md:text-xs font-black uppercase tracking-widest transition-all whitespace-nowrap ${state.seccionActiva === 'editor' ? 'bg-cyan-900/80 text-cyan-300 shadow-md' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800/80'}">
                                <i data-lucide="layout-template" class="w-4 h-4 mr-2"></i> Editor Topológico
                            </button>
                            <button onclick="window.setSeccionActiva('presupuesto')" class="flex items-center px-4 md:px-6 py-2.5 rounded-lg text-[10px] md:text-xs font-black uppercase tracking-widest transition-all whitespace-nowrap ${state.seccionActiva === 'presupuesto' ? 'bg-emerald-900/80 text-emerald-300 shadow-md' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800/80'}">
                                <i data-lucide="euro" class="w-4 h-4 mr-2"></i> LCSP Presupuestos <span class="ml-3 bg-emerald-950 text-emerald-400 border border-emerald-800 px-2 py-0.5 rounded shadow-inner">${state.elementosProyecto.length}</span>
                            </button>
                            <div class="w-px bg-slate-800 mx-1 md:mx-3 my-2"></div>
                            <button onclick="window.print()" ${state.elementosProyecto.length === 0 && state.capasCerramiento.length === 0 ? 'disabled' : ''} class="flex items-center px-4 md:px-8 py-2.5 bg-gradient-to-r from-indigo-700 to-indigo-900 hover:from-indigo-600 hover:to-indigo-800 disabled:opacity-30 disabled:grayscale rounded-lg text-[10px] md:text-xs font-black uppercase tracking-widest text-white shadow-[0_0_15px_rgba(67,56,202,0.5)] transition-all whitespace-nowrap">
                                <i data-lucide="file-signature" class="w-4 h-4 mr-2"></i> Exportar Visado
                            </button>
                        </div>
                    </div>

                    ${state.seccionActiva === 'editor' ? renderEditor() : renderPresupuesto()}
                    ${renderPrintView()}
                </div>
            `;
        }

        // ============================================================================
        // 7. CORE LOOP - UI RENDER
        // ============================================================================
        let activeInputId = null;
        let activeSelectionStart = null;

        window.restoreFocus = (id) => {
            activeInputId = id;
            const el = document.getElementById(id);
            if(el) {
                activeSelectionStart = el.selectionStart;
            }
        }

        function updateUI() {
            // Save focus state globally if we didn't via oninput
            if (document.activeElement && document.activeElement.tagName === 'INPUT') {
                activeInputId = document.activeElement.id;
                activeSelectionStart = document.activeElement.selectionStart;
            } else if (!activeInputId) {
                activeInputId = null;
                activeSelectionStart = null;
            }

            document.getElementById('app-root').innerHTML = renderApp();
            lucide.createIcons();

            // Restore focus
            if (activeInputId) {
                const el = document.getElementById(activeInputId);
                if (el) {
                    el.focus();
                    if (activeSelectionStart !== null && typeof el.selectionStart !== 'undefined') {
                        el.setSelectionRange(activeSelectionStart, activeSelectionStart);
                    }
                }
                activeInputId = null; 
            }
        }

        // Initial Load
        updateUI();

    </script>
</body>
</html>
